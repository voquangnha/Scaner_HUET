<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUET SCANNER v4.2 - MOBILE OPTIMIZED</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="onCvReady()"></script>
    <style>
        :root { --primary: #00e5ff; --bg: #121212; --panel: #1e1e1e; }
        body { margin: 0; font-family: 'Segoe UI', Arial; background: var(--bg); color: white; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* 1. Vùng Camera (60% chiều cao) */
        #camera-section { width: 100%; height: 60%; position: relative; background: #000; border-bottom: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .scan-overlay { position: absolute; top: 10%; left: 10%; right: 10%; bottom: 10%; border: 1px dashed rgba(0,229,255,0.4); pointer-events: none; }

        /* 2. Vùng Gallery (15% chiều cao) */
        #gallery-section { width: 100%; height: 15%; background: var(--panel); display: flex; align-items: center; padding: 5px 10px; box-sizing: border-box; overflow-x: auto; gap: 10px; }
        .thumb-box { position: relative; height: 80%; flex-shrink: 0; aspect-ratio: 3/4; }
        .thumb { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; border: 2px solid #444; }
        .page-num { position: absolute; bottom: 2px; right: 2px; background: var(--primary); color: #000; font-size: 0.6rem; padding: 1px 4px; border-radius: 3px; font-weight: bold; }

        /* 3. Vùng Điều khiển (25% chiều cao) */
        #control-section { width: 100%; height: 25%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; padding-bottom: env(safe-area-inset-bottom); }
        .btn-row { width: 90%; display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 12px 20px; border: none; border-radius: 12px; font-weight: bold; font-size: 0.9rem; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn-snap { background: var(--primary); color: #000; flex: 2; font-size: 1rem; box-shadow: 0 4px 15px rgba(0,229,255,0.3); }
        .btn-pdf { background: #ff5252; color: white; flex: 1; }
        .btn-tool { background: #444; color: white; width: 45px; height: 45px; padding: 0; display: flex; align-items: center; justify-content: center; }

        /* Modal Crop & Review */
        .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #crop-area { position: relative; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        #source-img { max-width: 95%; max-height: 95%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .handle { width: 34px; height: 34px; background: rgba(0,229,255,0.6); border: 2px solid white; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); touch-action: none; }
        
        #status-text { font-size: 0.7rem; color: var(--primary); letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="camera-section">
        <video id="webcam" autoplay playsinline muted></video>
        <div class="scan-overlay"></div>
    </div>

    <div id="gallery-section">
        </div>

    <div id="control-section">
        <div id="status-text">Đang khởi động hệ thống...</div>
        <div class="btn-row">
            <button class="btn btn-tool" onclick="location.reload()">🔄</button>
            <button id="btn-snap" class="btn btn-snap" disabled>CHỤP TÀI LIỆU</button>
            <button class="btn btn-pdf" onclick="exportPDF()">XUẤT PDF (<span id="count">0</span>)</button>
        </div>
    </div>

    <div id="crop-modal" class="modal">
        <div style="padding: 15px; text-align: center; background: #1a237e; font-size: 0.9rem;">CĂN CHỈNH GÓC TÀI LIỆU</div>
        <div id="crop-area">
            <img id="source-img" src="">
            <div id="p0" class="handle"></div><div id="p1" class="handle"></div>
            <div id="p2" class="handle"></div><div id="p3" class="handle"></div>
            <svg style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;">
                <polygon id="poly" points="" style="fill:rgba(0,229,255,0.2); stroke:white; stroke-width:2;" />
            </svg>
        </div>
        <div class="btn-row" style="background:#1e1e1e; padding: 15px;">
            <button class="btn" style="background:#555; color:white; flex:1;" onclick="closeModal()">HỦY</button>
            <button class="btn" style="background:#4caf50; color:white; flex:2;" onclick="doCrop()">XÁC NHẬN LẤY TRANG</button>
        </div>
    </div>

    <canvas id="hid-can" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const status = document.getElementById('status-text');
        const btnSnap = document.getElementById('btn-snap');
        const gallery = document.getElementById('gallery-section');
        const handles = [document.getElementById('p0'), document.getElementById('p1'), document.getElementById('p2'), document.getElementById('p3')];
        
        let pages = [];
        let rawData = null;
        let pts = [];

        function onCvReady() {
            btnSnap.innerText = "📸 CHỤP TRANG MỚI";
            btnSnap.disabled = false;
            status.innerText = "SẴN SÀNG QUÉT TÀI LIỆU";
        }

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 1280, height: 720 } 
            });
            video.srcObject = stream;
        }

        btnSnap.onclick = () => {
            const can = document.getElementById('hid-can');
            const ctx = can.getContext('2d');
            can.width = video.videoWidth; can.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            rawData = can.toDataURL('image/jpeg', 0.9);
            
            const sImg = document.getElementById('source-img');
            sImg.src = rawData;
            document.getElementById('crop-modal').style.display = 'flex';
            
            setTimeout(() => {
                const r = sImg.getBoundingClientRect();
                const p = 30;
                pts = [{x:r.left+p,y:r.top+p},{x:r.right-p,y:r.top+p},{x:r.right-p,y:r.bottom-p},{x:r.left+p,y:r.bottom-p}];
                draw();
            }, 200);
        };

        handles.forEach((h, i) => {
            h.ontouchmove = (e) => {
                const t = e.touches[0];
                pts[i] = { x: t.clientX, y: t.clientY };
                draw();
            };
        });

        function draw() {
            let s = "";
            handles.forEach((h, i) => {
                h.style.left = pts[i].x + 'px'; h.style.top = pts[i].y + 'px';
                s += `${pts[i].x},${pts[i].y} `;
            });
            document.getElementById('poly').setAttribute("points", s);
        }

        function closeModal() { document.getElementById('crop-modal').style.display = 'none'; }

        function doCrop() {
            const can = document.createElement('canvas');
            const img = new Image();
            img.src = rawData;
            img.onload = () => {
                const r = document.getElementById('source-img').getBoundingClientRect();
                const sx = img.width/r.width, sy = img.height/r.height;
                const fP = pts.map(p => ({ x:(p.x-r.left)*sx, y:(p.y-r.top)*sy }));
                const w = Math.max(Math.hypot(fP[1].x-fP[0].x, fP[1].y-fP[0].y), Math.hypot(fP[2].x-fP[3].x, fP[2].y-fP[3].y));
                const h = Math.max(Math.hypot(fP[3].x-fP[0].x, fP[3].y-fP[0].y), Math.hypot(fP[2].x-fP[1].x, fP[2].y-fP[1].y));
                
                let sM = cv.imread(img), dM = new cv.Mat();
                let sPts = cv.matFromArray(4,1,cv.CV_32FC2,[fP[0].x,fP[0].y,fP[1].x,fP[1].y,fP[2].x,fP[2].y,fP[3].x,fP[3].y]);
                let dPts = cv.matFromArray(4,1,cv.CV_32FC2,[0,0,w,0,w,h,0,h]);
                let M = cv.getPerspectiveTransform(sPts, dPts);
                cv.warpPerspective(sM, dM, M, new cv.Size(w, h));
                can.width = w; can.height = h;
                cv.imshow(can, dM);
                pages.push({ data: can.toDataURL('image/jpeg', 0.8), w: w, h: h });
                refreshGallery();
                sM.delete(); dM.delete(); sPts.delete(); dPts.delete(); M.delete();
                closeModal();
            };
        }

        function refreshGallery() {
            gallery.innerHTML = '';
            pages.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'thumb-box';
                div.innerHTML = `<img src="${p.data}" class="thumb"><span class="page-num">${i+1}</span>`;
                div.onclick = () => { if(confirm("Xóa trang này?")) { pages.splice(i,1); refreshGallery(); } };
                gallery.appendChild(div);
            });
            document.getElementById('count').innerText = pages.length;
        }

        function exportPDF() {
            if (pages.length === 0) return alert("Chưa có trang nào!");
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            pages.forEach((p, i) => {
                if (i > 0) doc.addPage();
                const ratio = p.w / p.h;
                let fw = 190, fh = 190 / ratio;
                if (fh > 277) { fh = 277; fw = fh * ratio; }
                doc.addImage(p.data, 'JPEG', (210-fw)/2, 10, fw, fh);
            });
            doc.save("HUET_Scan_Mobile.pdf");
        }

        startCamera();
    </script>
</body>
</html>
