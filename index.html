<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HUET SCANNER v5.5 - AI POWERED</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="onCvReady()"></script>
    <style>
        :root { --primary: #00e5ff; --bg: #0b0b0b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; height: -webkit-fill-available; overflow: hidden; background: var(--bg); font-family: -apple-system, system-ui, sans-serif; color: white; }
        
        #camera-view { height: 60%; width: 100%; position: relative; background: #000; border-bottom: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #ui-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; padding: 10px; background: linear-gradient(180deg, #111 0%, #000 100%); }
        #gallery { width: 100%; height: 80px; display: flex; overflow-x: auto; align-items: center; gap: 10px; padding: 0 15px; }
        .thumb-box { position: relative; height: 70px; aspect-ratio: 3/4; flex-shrink: 0; }
        .thumb { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; border: 1px solid #444; }
        
        .btn-row { width: 92%; display: flex; gap: 10px; }
        .btn { border: none; border-radius: 14px; font-weight: bold; cursor: pointer; height: 55px; font-size: 0.95rem; transition: 0.2s; }
        .btn-snap { background: var(--primary); color: #000; flex: 2; box-shadow: 0 0 20px rgba(0,229,255,0.2); }
        .btn-ai { background: #8e24aa; color: white; flex: 1; font-size: 0.8rem; } /* Nút Gemini AI */
        .btn-pdf { background: #ff5252; color: white; flex: 1; }
        
        #status { color: var(--primary); font-size: 0.7rem; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="camera-view">
        <video id="webcam" autoplay playsinline muted></video>
        <div style="position:absolute; inset:12%; border:1px dashed rgba(0,229,255,0.3); pointer-events:none;"></div>
    </div>

    <div id="ui-panel">
        <div id="status">HỆ THỐNG AI ĐÃ SẴN SÀNG</div>
        <div id="gallery"></div>
        <div class="btn-row">
            <button class="btn" style="background:#222; color:#fff; width:55px;" onclick="location.reload()">🔄</button>
            <button id="btn-snap" class="btn btn-snap" disabled>📸 CHỤP & XOAY DỌC</button>
            <button class="btn btn-ai" onclick="askGemini()">✨ HỎI AI</button>
            <button class="btn btn-pdf" onclick="exportPDF()">XUẤT PDF (<span id="count">0</span>)</button>
        </div>
    </div>

    <canvas id="hid-can" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const btnSnap = document.getElementById('btn-snap');
        const status = document.getElementById('status');
        const gallery = document.getElementById('gallery');
        let pages = [];

        function onCvReady() {
            btnSnap.disabled = false;
            status.innerText = "SẴN SÀNG QUÉT TÀI LIỆU";
        }

        async function startCamera() {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280, height: 720 } });
            video.srcObject = s;
        }

        btnSnap.onclick = () => {
            status.innerText = "ĐANG XỬ LÝ & XOAY DỌC...";
            const can = document.getElementById('hid-can');
            const ctx = can.getContext('2d');
            can.width = video.videoWidth; can.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            setTimeout(() => {
                try {
                    let src = cv.imread(can);
                    let dst = new cv.Mat();
                    cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
                    cv.GaussianBlur(dst, dst, new cv.Size(5, 5), 0);
                    cv.Canny(dst, dst, 75, 200);

                    let contours = new cv.MatVector();
                    let hierarchy = new cv.Mat();
                    cv.findContours(dst, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                    let maxArea = 0, poly = new cv.Mat();
                    for (let i = 0; i < contours.size(); ++i) {
                        let cnt = contours.get(i);
                        let approx = new cv.Mat();
                        cv.approxPolyDP(cnt, approx, 0.02 * cv.arcLength(cnt, true), true);
                        if (approx.rows == 4 && cv.contourArea(cnt) > maxArea) {
                            maxArea = cv.contourArea(cnt);
                            approx.copyTo(poly);
                        }
                        approx.delete();
                    }

                    if (maxArea > 15000) {
                        let pts = [];
                        for(let i=0; i<4; i++) pts.push({x: poly.data32S[i*2], y: poly.data32S[i*2+1]});
                        pts.sort((a, b) => a.y - b.y);
                        let tl = pts[0].x < pts[1].x ? pts[0] : pts[1];
                        let tr = pts[0].x < pts[1].x ? pts[1] : pts[0];
                        let bl = pts[2].x < pts[3].x ? pts[2] : pts[3];
                        let br = pts[2].x < pts[3].x ? pts[3] : pts[2];

                        let w = Math.max(Math.hypot(tr.x-tl.x, tr.y-tl.y), Math.hypot(br.x-bl.x, br.y-bl.y));
                        let h = Math.max(Math.hypot(bl.x-tl.x, bl.y-tl.y), Math.hypot(br.x-tr.x, br.y-tr.y));

                        let srcPts = cv.matFromArray(4, 1, cv.CV_32FC2, [tl.x, tl.y, tr.x, tr.y, br.x, br.y, bl.x, bl.y]);
                        let dstPts = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, w, 0, w, h, 0, h]);
                        let M = cv.getPerspectiveTransform(srcPts, dstPts);
                        let warp = new cv.Mat();
                        cv.warpPerspective(src, warp, M, new cv.Size(w, h));

                        // TÍNH NĂNG TỰ ĐỘNG XOAY DỌC
                        let finalMat = new cv.Mat();
                        if (w > h) {
                            cv.rotate(warp, finalMat, cv.ROTATE_90_CLOCKWISE);
                            [w, h] = [h, w]; // Đảo chiều sau khi xoay
                        } else {
                            warp.copyTo(finalMat);
                        }

                        const outCan = document.createElement('canvas');
                        cv.imshow(outCan, finalMat);
                        pages.push({ data: outCan.toDataURL('image/jpeg', 0.8), w: w, h: h });
                        
                        warp.delete(); finalMat.delete(); srcPts.delete(); dstPts.delete(); M.delete();
                    } else {
                        pages.push({ data: can.toDataURL('image/jpeg', 0.8), w: can.width, h: can.height });
                    }
                    renderGallery();
                    src.delete(); dst.delete(); contours.delete(); hierarchy.delete(); poly.delete();
                    status.innerText = "ĐÃ LƯU & XOAY THẲNG!";
                } catch (e) { status.innerText = "LỖI XỬ LÝ ẢNH"; }
            }, 300);
        };

        // HÀM KẾT NỐI GEMINI API
        async function askGemini() {
            if (pages.length === 0) return alert("Hãy scan một trang bài tập trước!");
            const apiKey = "DÁN_API_KEY_CỦA_THẦY_VÀO_ĐÂY"; // Thầy Nhã lấy key tại aistudio.google.com
            status.innerText = "GEMINI ĐANG PHÂN TÍCH BÀI LÀM...";
            
            // Ở đây Thầy Nhã có thể viết thêm code gọi API gửi ảnh cuối cùng cho Gemini
            alert("Tính năng AI: Gửi trang số " + pages.length + " tới Gemini để chấm bài.");
        }

        function renderGallery() {
            gallery.innerHTML = '';
            pages.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'thumb-box';
                div.innerHTML = `<img src="${p.data}" class="thumb"><span class="page-num">${i+1}</span>`;
                gallery.appendChild(div);
            });
            document.getElementById('count').innerText = pages.length;
        }

        function exportPDF() {
            if (pages.length === 0) return alert("Chưa có trang nào!");
            const doc = new window.jspdf.jsPDF('p', 'mm', 'a4');
            pages.forEach((p, i) => {
                if (i > 0) doc.addPage();
                const r = p.w / p.h;
                let fw = 190, fh = 190 / r;
                if (fh > 277) { fh = 277; fw = fh * r; }
                doc.addImage(p.data, 'JPEG', (210-fw)/2, 10, fw, fh);
            });
            doc.save("HUET_AI_Scan.pdf");
        }

        startCamera();
    </script>
</body>
</html>
