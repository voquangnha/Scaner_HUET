<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HUET SCANNER v4.9 - FINAL FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="onCvReady()"></script>
    <style>
        :root { --primary: #00e5ff; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: system-ui; }
        
        #camera-view { width: 100%; height: 70%; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #ui-panel { height: 30%; background: #111; display: flex; flex-direction: column; align-items: center; border-top: 1px solid #333; padding-bottom: env(safe-area-inset-bottom); }
        #gallery { flex: 1; width: 100%; display: flex; overflow-x: auto; align-items: center; gap: 10px; padding: 0 15px; }
        .thumb { width: 50px; height: 65px; object-fit: cover; border: 1px solid #555; border-radius: 4px; }

        .btn-row { width: 90%; display: flex; gap: 10px; margin-bottom: 15px; }
        .btn { border: none; border-radius: 12px; font-weight: bold; cursor: pointer; height: 50px; }
        .btn-snap { background: var(--primary); color: #000; flex: 2; font-size: 1rem; }
        .btn-pdf { background: #ff5252; color: white; flex: 1.2; font-size: 0.8rem; }

        /* MODAL CROP - FIX TUYỆT ĐỐI */
        #crop-modal { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        #crop-container { flex: 1; position: relative; width: 100%; display: flex; align-items: center; justify-content: center; }
        #source-img { width: 100%; height: auto; display: block; }
        
        .handle { 
            width: 60px; height: 60px; position: absolute; 
            transform: translate(-50%, -50%); touch-action: none; 
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        .handle::after { content: ''; width: 30px; height: 30px; background: rgba(0,229,255,0.4); border: 3px solid #fff; border-radius: 50%; }

        .modal-btns { height: 100px; background: #111; display: flex; gap: 15px; padding: 20px; align-items: center; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div id="camera-view">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <div id="ui-panel">
        <div id="gallery"></div>
        <div id="status" style="color:var(--primary); font-size: 0.7rem; margin: 5px 0;">ĐANG TẢI...</div>
        <div class="btn-row">
            <button class="btn" style="background:#333; color:#fff; width:50px;" onclick="location.reload()">🔄</button>
            <button id="btn-snap" class="btn btn-snap" disabled>CHỤP TÀI LIỆU</button>
            <button class="btn btn-pdf" onclick="exportPDF()">XUẤT PDF (<span id="count">0</span>)</button>
        </div>
    </div>

    <div id="crop-modal">
        <div style="padding: 15px; text-align: center; color: var(--primary); font-weight: bold;">KÉO 4 GÓC VÀO TỜ GIẤY</div>
        <div id="crop-container">
            <img id="source-img" src="">
            <div id="p0" class="handle"></div><div id="p1" class="handle"></div>
            <div id="p2" class="handle"></div><div id="p3" class="handle"></div>
            <svg style="position:absolute; inset:0; width:100%; height:100%; pointer-events:none;">
                <polygon id="poly" points="" style="fill:rgba(0,229,255,0.2); stroke:#fff; stroke-width:2;" />
            </svg>
        </div>
        <div class="modal-btns">
            <button class="btn" style="background:#444; color:#fff; flex:1;" onclick="closeCrop()">HỦY</button>
            <button class="btn" style="background:#4caf50; color:#fff; flex:2;" onclick="doWarp()">✅ XÁC NHẬN CẮT</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const btnSnap = document.getElementById('btn-snap');
        const handles = [document.getElementById('p0'), document.getElementById('p1'), document.getElementById('p2'), document.getElementById('p3')];
        let pages = [], rawBase64 = null, pts = [];

        function onCvReady() {
            btnSnap.innerText = "📸 CHỤP TRANG MỚI";
            btnSnap.disabled = false;
            document.getElementById('status').innerText = "SẴN SÀNG";
        }

        async function startCamera() {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280, height: 720 } });
            video.srcObject = s;
        }

        btnSnap.onclick = () => {
            const can = document.createElement('canvas');
            can.width = video.videoWidth; can.height = video.videoHeight;
            can.getContext('2d').drawImage(video, 0, 0);
            rawBase64 = can.toDataURL('image/jpeg', 0.9);
            
            const sImg = document.getElementById('source-img');
            sImg.src = rawBase64;
            document.getElementById('crop-modal').style.display = 'flex';
            
            sImg.onload = () => {
                const r = sImg.getBoundingClientRect();
                pts = [{x:r.left+40,y:r.top+40},{x:r.right-40,y:r.top+40},{x:r.right-40,y:r.bottom-40},{x:r.left+40,y:r.bottom-40}];
                updateUI();
            };
        };

        handles.forEach((h, i) => {
            const move = (e) => {
                e.preventDefault();
                const t = e.touches[0];
                pts[i] = { x: t.clientX, y: t.clientY };
                updateUI();
            };
            h.addEventListener('touchstart', move, {passive:false});
            h.addEventListener('touchmove', move, {passive:false});
        });

        function updateUI() {
            let s = "";
            handles.forEach((h, i) => {
                h.style.left = pts[i].x + 'px'; h.style.top = pts[i].y + 'px';
                s += `${pts[i].x},${pts[i].y} `;
            });
            document.getElementById('poly').setAttribute("points", s);
        }

        function closeCrop() { document.getElementById('crop-modal').style.display = 'none'; }

        function doWarp() {
            const img = new Image();
            img.src = rawBase64;
            img.onload = () => {
                const r = document.getElementById('source-img').getBoundingClientRect();
                const sx = img.naturalWidth / r.width;
                const sy = img.naturalHeight / r.height;
                
                // Tọa độ chuẩn xác trên ảnh gốc
                const fP = pts.map(p => ({ x: (p.x - r.left) * sx, y: (p.y - r.top) * sy }));

                const w = Math.hypot(fP[1].x-fP[0].x, fP[1].y-fP[0].y);
                const h = Math.hypot(fP[3].x-fP[0].x, fP[3].y-fP[0].y);

                let sM = cv.imread(img), dM = new cv.Mat();
                let sPts = cv.matFromArray(4, 1, cv.CV_32FC2, [fP[0].x, fP[0].y, fP[1].x, fP[1].y, fP[2].x, fP[2].y, fP[3].x, fP[3].y]);
                let dPts = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, w, 0, w, h, 0, h]);
                let M = cv.getPerspectiveTransform(sPts, dPts);
                cv.warpPerspective(sM, dM, M, new cv.Size(w, h));
                
                const outCan = document.createElement('canvas');
                cv.imshow(outCan, dM);
                pages.push({ data: outCan.toDataURL('image/jpeg', 0.8), w: w, h: h });
                
                renderGallery();
                sM.delete(); dM.delete(); sPts.delete(); dPts.delete(); M.delete();
                closeCrop();
            };
        }

        function renderGallery() {
            const gal = document.getElementById('gallery');
            gal.innerHTML = '';
            pages.forEach((p, i) => {
                const im = document.createElement('img');
                im.src = p.data; im.className = 'thumb';
                im.onclick = () => { if(confirm("Xóa trang?")) { pages.splice(i,1); renderGallery(); } };
                gal.appendChild(im);
            });
            document.getElementById('count').innerText = pages.length;
        }

        function exportPDF() {
            if (pages.length === 0) return alert("Chưa có trang nào!");
            const doc = new window.jspdf.jsPDF('p', 'mm', 'a4');
            pages.forEach((p, i) => {
                if (i > 0) doc.addPage();
                const r = p.w / p.h;
                let fw = 190, fh = 190 / r;
                if (fh > 277) { fh = 277; fw = fh * r; }
                doc.addImage(p.data, 'JPEG', (210-fw)/2, 10, fw, fh);
            });
            doc.save("HUET_Scan_Final.pdf");
        }

        startCamera();
    </script>
</body>
</html>
