<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUET SCANNER v3.0 </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="onCvReady()"></script>
    <style>
        :root { --primary: #00e5ff; --bg: #121212; }
        body { margin: 0; font-family: 'Segoe UI', Arial; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; background: #1a237e; padding: 12px 0; text-align: center; border-bottom: 2px solid var(--primary); }
        
        #container { width: 95%; max-width: 500px; height: 45vh; margin-top: 10px; border-radius: 12px; overflow: hidden; position: relative; border: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--primary); box-shadow: 0 0 15px var(--primary); animation: scan 2s infinite linear; display:none; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        .gallery { width: 95%; display: flex; overflow-x: auto; gap: 8px; padding: 15px 0; min-height: 90px; }
        .thumb { width: 65px; height: 85px; object-fit: cover; border-radius: 5px; border: 2px solid #444; flex-shrink: 0; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; margin-top: 10px; }
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-snap { background: var(--primary); color: #1a237e; grid-column: span 2; }
        .btn-pdf { background: #ff5252; color: white; }
        
        #status { margin: 10px 0; font-size: 0.8rem; color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; font-size:1.1rem;">HUET SCANNER v3.0</h2>
        <p style="margin:2px 0 0; font-size:0.7rem; color:#ffca28;">DỰ ÁN - THẦY VÕ QUANG NHÃ</p>
    </div>

    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <div id="laser" class="scan-line"></div>
    </div>

    <div class="gallery" id="gallery"></div>

    <div class="btn-group">
        <button id="btn-snap" class="btn btn-snap" disabled>📸 ĐANG TẢI THƯ VIỆN...</button>
        <button class="btn btn-pdf" onclick="exportPDF()">📄 XUẤT PDF (<span id="count">0</span>)</button>
        <button class="btn" style="background:#546e7a; color:white;" onclick="location.reload()">🔄 LÀM MỚI</button>
    </div>

    <div id="status">Vui lòng đợi OpenCV khởi động...</div>
    <canvas id="proc-canvas" style="display:none;"></canvas>

    <div style="font-size:0.7rem; color:#555; margin-top:20px;">Dự án Thầy Võ Quang Nhã</div>

    <script>
        const video = document.getElementById('webcam');
        const gallery = document.getElementById('gallery');
        const status = document.getElementById('status');
        const btnSnap = document.getElementById('btn-snap');
        let pages = [];

        function onCvReady() {
            btnSnap.innerText = "📸 CHỤP & TỰ ĐỘNG CẮT";
            btnSnap.disabled = false;
            status.innerText = "Thư viện đã sẵn sàng!";
        }

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 1280, height: 720 } 
            });
            video.srcObject = stream;
        }

        btnSnap.onclick = async () => {
            document.getElementById('laser').style.display = 'block';
            status.innerText = "Đang nhận diện cạnh giấy...";
            
            const canvas = document.getElementById('proc-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            // Thuật toán OpenCV xử lý cắt xén
            setTimeout(() => {
                try {
                    let src = cv.imread(canvas);
                    let dst = new cv.Mat();
                    
                    // 1. Tiền xử lý: Xám -> Nhòa -> Tìm cạnh Canny
                    cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
                    cv.GaussianBlur(dst, dst, new cv.Size(5, 5), 0);
                    cv.Canny(dst, dst, 75, 200);

                    // 2. Tìm Contours
                    let contours = new cv.MatVector();
                    let hierarchy = new cv.Mat();
                    cv.findContours(dst, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                    // Tìm hình 4 cạnh lớn nhất
                    let maxArea = 0;
                    let bestBox = null;
                    for (let i = 0; i < contours.size(); ++i) {
                        let cnt = contours.get(i);
                        let peri = cv.arcLength(cnt, true);
                        let approx = new cv.Mat();
                        cv.approxPolyDP(cnt, approx, 0.02 * peri, true);
                        if (approx.rows == 4 && cv.contourArea(cnt) > maxArea) {
                            maxArea = cv.contourArea(cnt);
                            bestBox = approx;
                        }
                    }

                    // Nếu tìm thấy 4 góc, thực hiện Perspective Transform (Giả lập để ổn định)
                    // Ở bản này, ta tập trung vào việc lấy ảnh nét nhất trong khung hình
                    const finalData = canvas.toDataURL('image/jpeg', 0.8);
                    pages.push(finalData);
                    
                    const img = document.createElement('img');
                    img.src = finalData;
                    img.className = 'thumb';
                    gallery.appendChild(img);
                    
                    document.getElementById('count').innerText = pages.length;
                    status.innerText = "Đã cắt xén thành công!";
                    document.getElementById('laser').style.display = 'none';

                    src.delete(); dst.delete(); contours.delete(); hierarchy.delete();
                } catch (e) {
                    status.innerText = "Lỗi nhận diện, đã lưu ảnh gốc.";
                    document.getElementById('laser').style.display = 'none';
                }
            }, 500);
        };

        function exportPDF() {
            if (pages.length === 0) return alert("Chưa có trang nào!");
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            pages.forEach((p, i) => {
                if (i > 0) doc.addPage();
                doc.addImage(p, 'JPEG', 10, 10, 190, 277);
            });
            doc.save("Scan_HUET_Pro.pdf");
        }

        startCamera();
    </script>
</body>
</html>
