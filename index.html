<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HUET SCANNER v4.7 - IPHONE ROTATION FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="onCvReady()"></script>
    <style>
        :root { --primary: #00e5ff; --bg: #121212; --panel: #1a1a1a; }
        
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; height: -webkit-fill-available; overflow: hidden; background: var(--bg); font-family: -apple-system, system-ui, sans-serif; }
        body { display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom); }

        /* Vùng Camera */
        #camera-section { flex: 50; position: relative; background: #000; border-bottom: 1px solid #333; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Vùng Gallery */
        #gallery-section { height: 90px; background: var(--panel); display: flex; align-items: center; padding: 5px 10px; overflow-x: auto; gap: 8px; flex-shrink: 0; }
        .thumb-box { position: relative; height: 90%; aspect-ratio: 3/4; flex-shrink: 0; }
        .thumb { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; border: 1px solid #555; }
        .page-num { position: absolute; top: -5px; right: -5px; background: var(--primary); color: #000; font-size: 0.6rem; width: 17px; height: 17px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; }

        /* Vùng Điều khiển */
        #control-section { flex: 30; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 120px; }
        .btn-row { width: 92%; display: flex; gap: 8px; align-items: center; justify-content: center; }
        .btn { border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn:active { opacity: 0.7; transform: scale(0.95); }
        .btn-snap { background: var(--primary); color: #000; flex: 2; height: 50px; font-size: 1rem; }
        .btn-pdf { background: #ff5252; color: white; flex: 1.2; height: 50px; font-size: 0.8rem; }
        .btn-reset { background: #333; color: white; width: 50px; height: 50px; font-size: 1.2rem; }

        /* MODAL CROP */
        .modal { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        #crop-area { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #080808; margin-bottom: 120px; } 
        #source-img { max-width: 95%; max-height: 95%; object-fit: contain; }
        .handle { width: 44px; height: 44px; background: rgba(0,229,255,0.4); border: 2px solid #fff; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); touch-action: none; z-index: 10001; }

        .modal-footer { position: absolute; bottom: 0; left: 0; width: 100%; height: 120px; background: #111; display: flex; gap: 10px; padding: 15px; box-sizing: border-box; align-items: center; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
    </style>
</head>
<body>

    <div id="camera-section">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <div id="gallery-section"></div>

    <div id="control-section">
        <div id="status" style="font-size: 0.75rem; color: var(--primary); margin-bottom: 8px; font-weight: bold;">SẴN SÀNG QUÉT (XOAY CỐ ĐỊNH)</div>
        <div class="btn-row">
            <button class="btn btn-reset" onclick="location.reload()">🔄</button>
            <button id="btn-snap" class="btn btn-snap" disabled>CHỤP TRANG MỚI</button>
            <button class="btn btn-pdf" onclick="exportPDF()">XUẤT PDF (<span id="count">0</span>)</button>
        </div>
    </div>

    <div id="crop-modal" class="modal">
        <div style="padding: 15px; text-align: center; font-weight: bold; color: var(--primary); background:#111; font-size: 0.9rem;">CĂN CHỈNH 4 GÓC TÀI LIỆU (DÙNG TAY)</div>
        <div id="crop-area">
            <img id="source-img" src="">
            <div id="p0" class="handle"></div><div id="p1" class="handle"></div>
            <div id="p2" class="handle"></div><div id="p3" class="handle"></div>
            <svg style="position:absolute; inset:0; width:100%; height:100%; pointer-events:none;">
                <polygon id="poly" points="" style="fill:rgba(0,229,255,0.2); stroke:#fff; stroke-width:2;" />
            </svg>
        </div>
        <div class="modal-footer">
            <button class="btn" style="background:#555; color:#fff; flex:1; height:55px;" onclick="closeModal()">HỦY BỎ</button>
            <button class="btn" style="background:#4caf50; color:#fff; flex:2; height:55px;" onclick="doCrop()">✅ XÁC NHẬN CẮT & XOAY</button>
        </div>
    </div>

    <canvas id="clean-canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const status = document.getElementById('status');
        const btnSnap = document.getElementById('btn-snap');
        const gallery = document.getElementById('gallery-section');
        const handles = [document.getElementById('p0'), document.getElementById('p1'), document.getElementById('p2'), document.getElementById('p3')];
        
        let pages = [];
        let rawData = null;
        let pts = [];

        function onCvReady() {
            btnSnap.innerText = "📸 CHỤP TRANG MỚI";
            btnSnap.disabled = false;
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 1280, height: 720 } 
                });
                video.srcObject = stream;
            } catch (e) { status.innerText = "LỖI CAMERA!"; }
        }

        btnSnap.onclick = () => {
            status.innerText = "Đang chụp và làm sạch hướng ảnh...";
            
            const rawCanvas = document.createElement('canvas');
            const rawCtx = rawCanvas.getContext('2d');
            rawCanvas.width = video.videoWidth; 
            rawCanvas.height = video.videoHeight;
            rawCtx.drawImage(video, 0, 0);

            // BƯỚC QUAN TRỌNG: Làm sạch ảnh (Khử EXIF Rotation)
            const cleanCanvas = document.getElementById('clean-canvas');
            const cleanCtx = cleanCanvas.getContext('2d');
            const tempImg = new Image();
            tempImg.src = rawCanvas.toDataURL('image/jpeg', 0.9);
            
            tempImg.onload = () => {
                // Ép buộc vẽ lại ảnh theo hướng ngang
                cleanCanvas.width = tempImg.width; 
                cleanCanvas.height = tempImg.height;
                cleanCtx.drawImage(tempImg, 0, 0);
                
                // Bây giờ rawData đã là ảnh sạch hoàn toàn
                rawData = cleanCanvas.toDataURL('image/jpeg', 0.9);
                
                const sImg = document.getElementById('source-img');
                sImg.src = rawData;
                document.getElementById('crop-modal').style.display = 'flex';
                
                setTimeout(() => {
                    const r = sImg.getBoundingClientRect();
                    const padX = r.width * 0.1;
                    const padY = r.height * 0.1;
                    pts = [{x:r.left+padX,y:r.top+padY},{x:r.right-padX,y:r.top+padY},{x:r.right-padX,y:r.bottom-padY},{x:r.left+padX,y:r.bottom-padY}];
                    draw();
                    status.innerText = "Hãy kéo thả 4 góc vào tờ giấy.";
                }, 300);
            };
        };

        handles.forEach((h, i) => {
            h.ontouchmove = (e) => {
                const t = e.touches[0];
                pts[i] = { x: t.clientX, y: t.clientY };
                draw();
            };
        });

        function draw() {
            let s = "";
            handles.forEach((h, i) => {
                h.style.left = pts[i].x + 'px'; h.style.top = pts[i].y + 'px';
                s += `${pts[i].x},${pts[i].y} `;
            });
            document.getElementById('poly').setAttribute("points", s);
        }

        function closeModal() { document.getElementById('crop-modal').style.display = 'none'; }

        function doCrop() {
            status.innerText = "Đang thực hiện ép phẳng và xoay thẳng...";
            const can = document.createElement('canvas');
            const img = new Image();
            img.src = rawData; // Dùng ảnh đã làm sạch EXIF
            img.onload = () => {
                const r = document.getElementById('source-img').getBoundingClientRect();
                const sx = img.width/r.width, sy = img.height/r.height;
                const fP = pts.map(p => ({ x:(p.x-r.left)*sx, y:(p.y-r.top)*sy }));
                const w = Math.max(Math.hypot(fP[1].x-fP[0].x, fP[1].y-fP[0].y), Math.hypot(fP[2].x-fP[3].x, fP[2].y-fP[3].y));
                const h = Math.max(Math.hypot(fP[3].x-fP[0].x, fP[3].y-fP[0].y), Math.hypot(fP[2].x-fP[1].x, fP[2].y-fP[1].y));
                
                let sM = cv.imread(img), dM = new cv.Mat();
                let sPts = cv.matFromArray(4,1,cv.CV_32FC2,[fP[0].x,fP[0].y,fP[1].x,fP[1].y,fP[2].x,fP[2].y,fP[3].x,fP[3].y]);
                let dPts = cv.matFromArray(4,1,cv.CV_32FC2,[0,0,w,0,w,h,0,h]);
                let M = cv.getPerspectiveTransform(sPts, dPts);
                cv.warpPerspective(sM, dM, M, new cv.Size(w, h));
                
                can.width = w; can.height = h;
                cv.imshow(can, dM);
                
                pages.push({ data: can.toDataURL('image/jpeg', 0.8), w: w, h: h });
                renderGallery();
                sM.delete(); dM.delete(); sPts.delete(); dPts.delete(); M.delete();
                closeModal();
                status.innerText = "Đã lưu và xoay thẳng trang " + pages.length;
            };
        }

        function renderGallery() {
            gallery.innerHTML = '';
            pages.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'thumb-box';
                div.innerHTML = `<img src="${p.data}" class="thumb"><span class="page-num">${i+1}</span>`;
                div.onclick = () => { if(confirm("Xóa trang " + (i+1) + "?")) { pages.splice(i,1); renderGallery(); } };
                gallery.appendChild(div);
            });
            document.getElementById('count').innerText = pages.length;
        }

        function exportPDF() {
            if (pages.length === 0) return alert("Chưa có trang nào!");
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            pages.forEach((p, i) => {
                if (i > 0) doc.addPage();
                const ratio = p.w / p.h;
                let fw = 190, fh = 190 / ratio;
                if (fh > 277) { fh = 277; fw = fh * ratio; }
                doc.addImage(p.data, 'JPEG', (210-fw)/2, 10, fw, fh);
            });
            doc.save("HUET_Scan_ZeroGravity.pdf");
        }

        startCamera();
    </script>
</body>
</html>
