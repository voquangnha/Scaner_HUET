<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HUET SCANNER v5.0 - SAFARI ABSOLUTE FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="onCvReady()"></script>
    <style>
        :root { --primary: #00e5ff; --bg: #000; --panel: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; height: -webkit-fill-available; overflow: hidden; background: #000; font-family: -apple-system, system-ui, sans-serif; }
        
        body { display: flex; flex-direction: column; }
        
        #camera-view { height: 60%; width: 100%; position: relative; background: #000; overflow: hidden; border-bottom: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #ui-panel { flex: 1; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        #gallery { width: 100%; height: 80px; display: flex; overflow-x: auto; align-items: center; gap: 8px; padding: 0 15px; }
        .thumb-box { position: relative; height: 70px; aspect-ratio: 3/4; flex-shrink: 0; }
        .thumb { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; border: 1px solid #555; }
        .page-num { position: absolute; top: -5px; right: -5px; background: var(--primary); color: #000; font-size: 0.6rem; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; }
        
        .btn-row { width: 90%; display: flex; gap: 10px; margin-bottom: 5px; }
        .btn { border: none; border-radius: 12px; font-weight: bold; cursor: pointer; height: 50px; }
        .btn-snap { background: var(--primary); color: #000; flex: 2; font-size: 1rem; }
        .btn-pdf { background: #ff5252; color: white; flex: 1.2; font-size: 0.8rem; }

        /* MODAL CROP - KHÓA TỌA ĐỘ TUYỆT ĐỐI */
        #crop-modal { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; touch-action: none; }
        #crop-title { padding: 15px; text-align: center; color: var(--primary); font-weight: bold; font-size: 0.9rem; background: #111; border-bottom: 1px solid #333; }
        #crop-container { flex: 1; position: relative; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #080808; }
        #source-img { max-width: 95%; max-height: 95%; object-fit: contain; pointer-events: none; -webkit-user-select: none; user-select: none; }
        
        .handle { width: 50px; height: 50px; position: absolute; transform: translate(-50%, -50%); touch-action: none; z-index: 10001; display: flex; align-items: center; justify-content: center; }
        .handle::after { content: ''; width: 32px; height: 32px; background: rgba(0,229,255,0.4); border: 3px solid #fff; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        .modal-btns { height: 110px; background: #111; display: flex; gap: 15px; padding: 20px; align-items: center; border-top: 1px solid #333; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
    </style>
</head>
<body>

    <div id="camera-view">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <div id="ui-panel">
        <div id="gallery"></div>
        <div id="status" style="color:var(--primary); font-size: 0.7rem; margin: 3px 0; font-weight: bold;">SẴN SÀNG</div>
        <div class="btn-row">
            <button class="btn" style="background:#333; color:#fff; width:50px;" onclick="location.reload()">🔄</button>
            <button id="btn-snap" class="btn btn-snap" disabled>CHỤP TRANG</button>
            <button class="btn btn-pdf" onclick="exportPDF()">XUẤT PDF (<span id="count">0</span>)</button>
        </div>
    </div>

    <div id="crop-modal">
        <div id="crop-title">CĂN CHỈNH 4 GÓC (DÙNG TAY KÉO)</div>
        <div id="crop-container">
            <img id="source-img" src="" alt="Scan source">
            <div id="p0" class="handle"></div><div id="p1" class="handle"></div>
            <div id="p2" class="handle"></div><div id="p3" class="handle"></div>
            <svg style="position:absolute; inset:0; width:100%; height:100%; pointer-events:none;">
                <polygon id="poly" points="" style="fill:rgba(0,229,255,0.2); stroke:#fff; stroke-width:2.5;" />
            </svg>
        </div>
        <div class="modal-btns">
            <button class="btn" style="background:#444; color:#fff; flex:1;" onclick="closeCrop()">HỦY</button>
            <button class="btn" style="background:#4caf50; color:#fff; flex:2;" onclick="doWarp()">✅ XÁC NHẬN CẮT</button>
        </div>
    </div>

    <canvas id="hid-can" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const btnSnap = document.getElementById('btn-snap');
        const gallery = document.getElementById('gallery');
        const handles = [document.getElementById('p0'), document.getElementById('p1'), document.getElementById('p2'), document.getElementById('p3')];
        let pages = [], rawBase64 = null, pts = [];

        function onCvReady() {
            btnSnap.innerText = "📸 CHỤP TRANG MỚI";
            btnSnap.disabled = false;
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280, height: 720 } });
                video.srcObject = stream;
            } catch (e) { alert("Lỗi mở camera. Hãy cấp quyền!"); }
        }

        btnSnap.onclick = () => {
            const can = document.getElementById('hid-can');
            const ctx = can.getContext('2d');
            can.width = video.videoWidth; can.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            rawBase64 = can.toDataURL('image/jpeg', 0.9);
            
            const sImg = document.getElementById('source-img');
            sImg.src = rawBase64;
            document.getElementById('crop-modal').style.display = 'flex';
            
            sImg.onload = () => {
                // Đặt 4 góc mặc định ban đầu
                const r = sImg.getBoundingClientRect();
                pts = [
                    {x: r.left + 50, y: r.top + 50}, // Trên-Trái
                    {x: r.right - 50, y: r.top + 50}, // Trên-Phải
                    {x: r.right - 50, y: r.bottom - 50}, // Dưới-Phải
                    {x: r.left + 50, y: r.bottom - 50} // Dưới-Trái
                ];
                updateUI();
            };
        };

        handles.forEach((h, i) => {
            const move = (e) => {
                e.preventDefault(); 
                e.stopPropagation();
                const t = e.touches[0];
                // Lấy tọa độ tuyệt đối ClientX/Y để không bị ảnh hưởng bởi cuộn trang
                pts[i] = { x: t.clientX, y: t.clientY };
                updateUI();
            };
            h.addEventListener('touchstart', move, {passive:false});
            h.addEventListener('touchmove', move, {passive:false});
        });

        function updateUI() {
            let ptsStr = "";
            handles.forEach((h, i) => {
                h.style.left = pts[i].x + 'px'; 
                h.style.top = pts[i].y + 'px';
                ptsStr += `${pts[i].x},${pts[i].y} `;
            });
            document.getElementById('poly').setAttribute("points", ptsStr);
        }

        function closeCrop() { document.getElementById('crop-modal').style.display = 'none'; }

        function doWarp() {
            document.getElementById('status').innerText = "Đang cắt xén chính xác...";
            const img = new Image();
            img.src = rawBase64;
            img.onload = () => {
                const sImg = document.getElementById('source-img');
                const r = sImg.getBoundingClientRect();
                
                // Thuật toán bù trừ Safari: Tính toán tỉ lệ dựa trên kích thước THỰC TẾ của ảnh đang hiển thị
                const sx = img.naturalWidth / r.width;
                const sy = img.naturalHeight / r.height;
                
                // Quy đổi tọa độ ngón tay (Client) thành tọa độ Pixel chuẩn trên ảnh gốc
                // Bù trừ vị trí Top/Left của ảnh để khử lỗi lệch do thanh Safari thu nhỏ
                const finalPts = pts.map(p => ({ 
                    x: (p.x - r.left) * sx, 
                    y: (p.y - r.top) * sy 
                }));

                const w = Math.max(Math.hypot(finalPts[1].x-finalPts[0].x, finalPts[1].y-finalPts[0].y), Math.hypot(finalPts[2].x-finalPts[3].x, finalPts[2].y-finalPts[3].y));
                const h = Math.max(Math.hypot(finalPts[3].x-finalPts[0].x, finalPts[3].y-finalPts[0].y), Math.hypot(finalPts[2].x-finalPts[1].x, finalPts[2].y-finalPts[1].y));

                let srcMat = cv.imread(img);
                let dstMat = new cv.Mat();
                let srcPtsMat = cv.matFromArray(4, 1, cv.CV_32FC2, [finalPts[0].x, finalPts[0].y, finalPts[1].x, finalPts[1].y, finalPts[2].x, finalPts[2].y, finalPts[3].x, finalPts[3].y]);
                let dstPtsMat = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, w, 0, w, h, 0, h]);
                let M = cv.getPerspectiveTransform(srcPtsMat, dstPtsMat);
                
                // Thực hiện phép biến đổi Warp Perspective để ép phẳng tờ giấy
                cv.warpPerspective(srcMat, dstMat, M, new cv.Size(w, h));
                
                const outCan = document.createElement('canvas');
                cv.imshow(outCan, dstMat);
                pages.push({ data: outCan.toDataURL('image/jpeg', 0.8), w: w, h: h });
                
                renderGallery();
                // Cleanup bộ nhớ OpenCV
                srcMat.delete(); dstMat.delete(); srcPtsMat.delete(); dstPtsMat.delete(); M.delete();
                closeCrop();
                document.getElementById('status').innerText = "Đã scan chuẩn xác!";
            };
        }

        function renderGallery() {
            gallery.innerHTML = '';
            pages.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'thumb-box';
                div.innerHTML = `<img src="${p.data}" class="thumb"><span class="page-num">${i+1}</span>`;
                div.onclick = () => { if(confirm("Xóa trang " + (i+1) + "?")) { pages.splice(i,1); renderGallery(); } };
                gallery.appendChild(div);
            });
            document.getElementById('count').innerText = pages.length;
        }

        function exportPDF() {
            if (pages.length === 0) return alert("Chưa có trang nào!");
            const doc = new window.jspdf.jsPDF('p', 'mm', 'a4');
            pages.forEach((p, i) => {
                if (i > 0) doc.addPage();
                const r = p.w / p.h;
                let fw = 190, fh = 190 / r;
                if (fh > 277) { fh = 277; fw = fh * r; }
                doc.addImage(p.data, 'JPEG', (210-fw)/2, 10, fw, fh);
            });
            doc.save("HUET_Scan_Final.pdf");
        }

        startCamera();
    </script>
</body>
</html>
