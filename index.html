<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUET SCANNER v3.5 - A4 STANDARD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="onCvReady()"></script>
    <style>
        :root { --primary: #00e5ff; --bg: #121212; }
        body { margin: 0; font-family: 'Segoe UI', Arial; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; background: #1a237e; padding: 12px 0; text-align: center; border-bottom: 2px solid var(--primary); }
        #view { width: 95%; max-width: 500px; height: 45vh; margin-top: 10px; border-radius: 12px; overflow: hidden; position: relative; border: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .gallery { width: 95%; display: flex; overflow-x: auto; gap: 8px; padding: 15px 0; min-height: 90px; }
        .thumb { width: 65px; height: 85px; object-fit: cover; border-radius: 5px; border: 2px solid #444; flex-shrink: 0; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; margin-top: 10px; }
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-snap { background: var(--primary); color: #1a237e; grid-column: span 2; }
        .btn-pdf { background: #ff5252; color: white; }
        #status { margin: 10px 0; font-size: 0.8rem; color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; font-size:1.1rem;">HUET SCANNER v3.5</h2>
        <p style="margin:2px 0 0; font-size:0.7rem; color:#ffca28;">DỰ ÁN - THẦY VÕ QUANG NHÃ</p>
    </div>

    <div id="view">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <div class="gallery" id="gallery"></div>

    <div class="btn-group">
        <button id="btn-snap" class="btn btn-snap" disabled>📸 ĐANG TẢI THƯ VIỆN...</button>
        <button class="btn btn-pdf" onclick="exportA4PDF()">📄 XUẤT PDF A4 (<span id="count">0</span>)</button>
        <button class="btn" style="background:#546e7a; color:white;" onclick="location.reload()">🔄 LÀM MỚI</button>
    </div>

    <div id="status">Vui lòng đợi OpenCV...</div>
    <canvas id="proc-canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const gallery = document.getElementById('gallery');
        const status = document.getElementById('status');
        const btnSnap = document.getElementById('btn-snap');
        let pages = [];

        function onCvReady() {
            btnSnap.innerText = "📸 CHỤP & CĂN LỀ A4";
            btnSnap.disabled = false;
            status.innerText = "Đã sẵn sàng căn lề chuẩn!";
        }

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 1280, height: 720 } 
            });
            video.srcObject = stream;
        }

        btnSnap.onclick = () => {
            const canvas = document.getElementById('proc-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            // Xử lý cắt xén và chuẩn hóa tỉ lệ (Giả lập Perspective Transform thông qua Crop)
            const finalData = canvas.toDataURL('image/jpeg', 0.8);
            pages.push({
                data: finalData,
                w: canvas.width,
                h: canvas.height
            });
            
            const img = document.createElement('img');
            img.src = finalData;
            img.className = 'thumb';
            gallery.appendChild(img);
            
            document.getElementById('count').innerText = pages.length;
            status.innerText = "Đã lưu trang và căn lề!";
        };

        function exportA4PDF() {
            if (pages.length === 0) return alert("Chưa có trang nào!");
            const { jsPDF } = window.jspdf;
            
            // Tạo PDF khổ A4 (210mm x 297mm)
            const doc = new jsPDF('p', 'mm', 'a4');
            const pageWidth = 210;
            const pageHeight = 297;
            const margin = 10; // Căn lề 10mm mỗi bên
            const printWidth = pageWidth - (margin * 2);
            const printHeight = pageHeight - (margin * 2);

            pages.forEach((p, i) => {
                if (i > 0) doc.addPage();

                // Tính toán tỉ lệ để không bị méo hình
                const ratio = p.w / p.h;
                let finalW, finalH;

                if (ratio > 1) { // Ảnh ngang
                    doc.setPage(i + 1, 'l'); // Đổi trang này sang nằm ngang
                    finalH = printWidth; // Đảo chiều vì trang đã xoay
                    finalW = finalH * ratio;
                    if (finalW > 277) { // 297 - 20 lề
                        finalW = 277;
                        finalH = finalW / ratio;
                    }
                    doc.addImage(p.data, 'JPEG', margin, margin, finalW, finalH);
                } else { // Ảnh dọc
                    finalW = printWidth;
                    finalH = finalW / ratio;
                    // Nếu ảnh quá dài, thu nhỏ theo chiều cao
                    if (finalH > printHeight) {
                        finalH = printHeight;
                        finalW = finalH * ratio;
                    }
                    // Căn giữa trang
                    const xOffset = (pageWidth - finalW) / 2;
                    doc.addImage(p.data, 'JPEG', xOffset, margin, finalW, finalH);
                }
            });

            doc.save("STEM_PhuBai_Standard_A4.pdf");
            status.innerText = "PDF đã sẵn sàng để in!";
        }

        startCamera();
    </script>
</body>
</html>
